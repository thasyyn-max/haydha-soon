<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#164F1A" />
    <meta name="description" content="haydha — a household budget app for Maldivian families. Track income, expenses, bills, and savings together. Free, no ads, MVR-native." />

    <!-- 1. Instant browser-level redirect (works even with JS disabled). -->
    <meta http-equiv="refresh" content="0; url=https://www.haydha.com/" />

    <!-- 2. Canonical so search engines fold haydha.com into www.haydha.com. -->
    <link rel="canonical" href="https://www.haydha.com/" />
    <!-- noindex on the redirect itself — we want www to rank, not this stub. -->
    <meta name="robots" content="noindex,follow" />

    <title>haydha — household budget app for Maldivian families</title>

    <!-- OG tags so social previews on the apex don't show the old
         "coming soon" body either. Matches the canonical www site. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="haydha" />
    <meta property="og:url" content="https://www.haydha.com/" />
    <meta property="og:title" content="haydha — household budget for the family" />
    <meta property="og:description" content="Track income, expenses, bills, and savings goals with your household. Free, no ads, made for families in the Maldives." />
    <meta property="og:image" content="https://www.haydha.com/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- 3. JS replace() as a safety net + faster than meta-refresh in some browsers.
         Use replace() not href= so the user's back-button doesn't loop them back here. -->
    <script>
      try { window.location.replace('https://www.haydha.com/' + (window.location.search || '') + (window.location.hash || '')) } catch (_) {}
    </script>

    <style>
      :root {
        --bg:           #F4F4EF;
        --brand-deep:   #164F1A;
        --fg-3:         #5D6F62;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { min-height: 100vh; }
      body {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--fg-3);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 360px;
      }
      .mark {
        width: 44px;
        height: 44px;
        margin: 0 auto 18px;
      }
      h1 {
        font-size: 17px;
        font-weight: 600;
        color: var(--brand-deep);
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 16px;
      }
      a {
        color: var(--brand-deep);
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <!-- Visible only if both the meta-refresh AND the JS redirect fail,
         which is rare. Gives the user a manual escape hatch. -->
    <div class="card">
      <svg class="mark" viewBox="325.07 201.77 191.74 191.74" aria-hidden="true">
        <rect x="325.07" y="201.77" width="191.74" height="191.74" rx="43.69" ry="43.69" fill="#164F1A"/>
        <path fill="#B9EF75" d="M389.25,362.51l49.34-127.07c2.24-5.76-2.01-11.97-8.2-11.97h-16.42c-3.63,0-6.88,2.23-8.2,5.61l-49.34,127.07c-2.24,5.76,2.01,11.97,8.2,11.97h16.42c3.63,0,6.88-2.23,8.2-5.61Z"/>
        <path fill="#B9EF75" d="M435.53,319.62h36.38c2.85,0,5.4-1.76,6.4-4.42l7.27-19.2c1.7-4.48,-1.61-9.27-6.4-9.27h-36.38c-2.85,0-5.4,1.76-6.4,4.42l-7.27,19.2c-1.7,4.48,1.61,9.27,6.4,9.27Z"/>
      </svg>
      <h1>haydha</h1>
      <p>Taking you to the app at <a href="https://www.haydha.com/">www.haydha.com</a>…</p>
    </div>
  </body>
</html>
